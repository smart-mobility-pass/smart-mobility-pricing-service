spring.application.name=pricing-discount-service
# Localhost by default for IDE, overridden by CONFIG_SERVER_URL env var in Docker
spring.config.import=optional:configserver:http://${CONFIG_SERVER_URL:localhost}:8888

# Actuator (Minimum metadata)
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.show-details=always

management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

